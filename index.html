    <!-- JSON-LD Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Boi Rajjo",
      "alternateName": "বই রাজ্য",
      "url": "https://boirajjo.lovable.app",
      "description": "Campus book marketplace for buying and selling used academic books in Bangladesh. Browse Nilkhet shops, request books, and connect with sellers via WhatsApp.",
      "applicationCategory": "ShoppingApplication",
      "operatingSystem": "Web",
      "inLanguage": ["en", "bn"],
      "offers": {
        "@type": "AggregateOffer",
        "priceCurrency": "BDT",
        "lowPrice": "0",
        "offerCount": "100+",
        "availability": "https://schema.org/InStock"
      },
      "publisher": {
        "@type": "Organization",
        "name": "Boi Rajjo",
        "url": "https://boirajjo.lovable.app",
        "logo": {
          "@type": "ImageObject",
          "url": "https://boirajjo.lovable.app/logo.png"
        }
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://boirajjo.lovable.app/browse/academic?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: Local Business for Nilkhet -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Nilkhet Book Market — via Boi Rajjo",
      "description": "Browse and order books from Nilkhet book market shops online with home delivery across Bangladesh.",
      "url": "https://boirajjo.lovable.app/nilkhet",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Nilkhet",
        "addressLocality": "Dhaka",
        "addressCountry": "BD"
      },
      "priceRange": "৳"
    }
    </script>
